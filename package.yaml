name:                tracked-gg-visualize
version:             0.1.0.0
github:              "githubuser/tracked-gg-visualize"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/tracked-gg-visualize#readme>

language: GHC2024

default-extensions:
- NoImplicitPrelude
- ExtendedDefaultRules
- LambdaCase
- OverloadedStrings
- TypeFamilies
- DeriveGeneric

dependencies:
- base >= 4.7 && < 5
- universum >= 1.8.3 && < 2
- zip >= 2.2.1 && < 3
- cassava >= 0.5.4.1 && < 0.6
- conduit >= 1.3.6.1 && < 2
- vector >= 0.13.2 && < 0.14
- hvega >= 0.12.0.7 && < 0.13
- envy >= 2.1.5.0 && < 3

ghc-options:
- -Wall
- -Wno-type-defaults
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  tracked-gg-visualize-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - tracked-gg-visualize

tests:
  tracked-gg-visualize-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - tracked-gg-visualize
